name: Test Coverage Analysis

on:
  schedule:
    - cron: "0 6 * * 0" # Weekly Sunday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.8
        with:
          cache: true
          locked: false

      - name: Run Claude test coverage analysis
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--model claude-sonnet-4-6 --max-turns 25 --allowedTools Read,Glob,Grep,Bash"
          prompt: |
            You are a test coverage analysis agent.
            Read CLAUDE.md for project-specific test and coverage configuration.

            Analyze test coverage:
            1. Read CLAUDE.md to find the coverage command, threshold, and test framework.
            2. Run: pixi run test-cov
            3. Analyze results:
               - Files below the coverage threshold (80%)
               - Critical code paths without any tests
               - Edge cases that should have tests
               - Whether property-based tests exist for pure functions
            4. Read source files with low coverage to understand what's untested.

            For each finding:
            a. Check for existing open issues:
               gh issue list --repo ${{ github.repository }} --label source:test-coverage --state open --json title --jq '.[].title'
            b. If no matching issue, create one:
               - Title: "[test-coverage] <module/file>: <current>% (threshold: 80%)"
               - Labels: type:chore, priority:2, claude:implement, source:test-coverage
               - Use --body-file /tmp/issue-<n>.md
               - Apply labels with separate --add-label flags
               - Body should describe what's untested and suggest test cases
            c. If matching issue exists, add a comment with updated coverage data.

            Write summary to /tmp/summary.md.

            Post the summary as a sticky comment on the "[Factory Dashboard]" issue (find-or-create pattern):
              MARKER="<!-- factory:test-coverage -->"
              DASHBOARD=$(gh issue list --repo ${{ github.repository }} --search "[Factory Dashboard]" --state open --json number --jq '.[0].number')
              if [ -n "$DASHBOARD" ]; then
                COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/$DASHBOARD/comments \
                  --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" | head -1)
                echo "$MARKER" | cat - /tmp/summary.md > /tmp/summary-marked.md
                if [ -n "$COMMENT_ID" ]; then
                  gh api repos/${{ github.repository }}/issues/comments/$COMMENT_ID \
                    -X PATCH -f body=@/tmp/summary-marked.md
                else
                  gh issue comment "$DASHBOARD" --repo ${{ github.repository }} --body-file /tmp/summary-marked.md
                fi
              fi
