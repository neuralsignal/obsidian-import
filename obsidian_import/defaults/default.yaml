input:
  directories: []

output:
  directory: ./extracted
  frontmatter: true
  metadata_fields:
    - title
    - source
    - original_path
    - file_type
    - extracted_at
    - page_count

backends:
  pdf: native
  docx: native
  pptx: native
  xlsx: native
  csv: native
  json: native
  yaml: native
  image: native
  html: markitdown
  default: native

extraction:
  timeout_seconds: 120
  max_file_size_mb: 100
  xlsx_max_rows_per_sheet: 500
  # Where the extraction work runs while the timeout is enforced:
  #   thread  — daemon thread; lower latency per file, but a timed-out
  #             extraction keeps running (and holding memory) in the
  #             background. Best for one-shot CLI use.
  #   process — separate process; true cancellation (the process is killed
  #             on timeout) plus memory isolation. Recommended for
  #             long-running daemons. Two costs vs thread mode: each call
  #             spawns a fresh interpreter, so backend imports are re-paid
  #             per file and count against timeout_seconds (negligible for
  #             native backends, several seconds to tens of seconds for
  #             docling/torch — raise timeout_seconds or prefer thread mode
  #             for docling batch runs). Script callers must invoke
  #             extract_file/extract_text under `if __name__ == "__main__":`
  #             because spawn re-imports the calling module in the child.
  isolation: thread

media:
  extract_images: true
  image_format: png
  image_max_dimension: 0
  image_max_bytes: 50000000
  image_max_pixels: 50000000
  image_allowed_formats:
    - PNG
    - JPEG
    - GIF
    - BMP
    - TIFF
    - WEBP

passthrough:
  extensions: []
  paths: []
  patterns: []

# Per-directory defaults: when users add directories, each entry must specify
# path, extensions, and exclude explicitly. Example:
#
# input:
#   directories:
#     - path: /home/user/documents
#       extensions: [".pdf", ".docx", ".pptx", ".xlsx"]
#       exclude: ["*.tmp", "~$*"]
#
# Passthrough: files matching any rule are copied as-is, no extraction.
# Rules are OR'd: a file matching any extension, path glob, or regex is passed through.
#
# passthrough:
#   extensions: [".md", ".markdown", ".canvas"]
#   paths: ["notes/raw/**"]
#   patterns: [".*\\.generated\\..*"]
