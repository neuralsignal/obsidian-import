[workspace]
channels = ["conda-forge"]
name = "obsidian-import"
platforms = ["linux-64", "osx-arm64"]
version = "1.2.1" # x-release-please-version

[dependencies]
python = ">=3.12,<3.15"
python-build = ">=1.4.0,<2"
hatchling = ">=1.28.0,<2"
pip = ">=26.1,<27"  # CVE-2026-3219: no fix available as of 2026-05-18, build-only dep
setuptools = ">=78.1.1,<79"

[pypi-dependencies]
obsidian-import = {path = ".", editable = true}
pyyaml = ">=6.0,<7"
click = ">=8.0,<9"
pdfplumber = ">=0.11,<1"
pypdf = ">=6.13.3,<7"
defusedxml = ">=0.7,<1"
python-pptx = ">=1.0,<2"
openpyxl = ">=3.1,<4"
idna = ">=3.15,<4"  # CVE-2026-45409: ReDoS incomplete fix
Pillow = ">=12.2,<13"
pytest = ">=9.0.3,<10"
hypothesis = ">=6.0,<7"
ruff = ">=0.11,<1"
pytest-cov = ">=5.0,<6"
pre-commit = ">=4.0,<5"
mkdocs = ">=1.6,<2"
mkdocs-material = ">=9.5,<10"
pymdown-extensions = ">=10.21.3,<11"  # CVE-2026-46338: snippets path traversal
mkdocstrings = {version = ">=0.29,<1", extras = ["python"]}
docling = ">=2.94.0,<3"  # CVE-2026-44017/44018/44019/44023/47214: docling/docling-core Zip Slip, XXE, file:// + SSRF (fixed >=2.94.0); PYSEC-2026-139: transitive torch deserialization vuln, no fix as of 2026-05-25; PYSEC-2025-217: transitive transformers X-CLIP RCE, no fix available as of 2026-06-29
pyasn1 = ">=0.6.3,<1"
jinja2 = ">=3.1.6,<4"
pyjwt = ">=2.13.0,<3"  # PYSEC-2026-175/177/178/179: algorithm confusion, SSRF
urllib3 = ">=2.7.0,<3"
pyopenssl = ">=26.0.0,<27"
cryptography = ">=48.0.1,<49"  # GHSA-537c-gmf6-5ccf: bundled OpenSSL vuln
pydantic-settings = ">=2.14.2,<3"  # GHSA-4xgf-cpjx-pc3j: symlink path traversal in NestedSecretsSettingsSource

[tasks]
lint = "ruff check obsidian_import/ tests/"
format-check = "ruff format --check obsidian_import/ tests/"
format = "ruff format obsidian_import/ tests/"
test = "pytest tests/ -v --tb=short"
test-cov = "pytest tests/ -v --tb=short --cov=obsidian_import --cov-report=term-missing"
pre-commit-install = "pre-commit install"
docs-build = "mkdocs build"
docs-serve = "mkdocs serve"
